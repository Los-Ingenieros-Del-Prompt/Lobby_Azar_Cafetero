spring.application.name=lobby-test

# Use H2 for tests
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Flyway for tests or use H2 compatible migrations
# Given FlywayConfig is manual, it might need specific handling
spring.flyway.enabled=false

# Default values for security
jwt.secret=test-secret-test-secret-test-secret-test-secret
internal.api.key=test-api-key

logging.level.org.springframework=INFO
logging.level.com.aguardientes=DEBUG
