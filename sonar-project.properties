sonar.projectKey=Los-Ingenieros-Del-Prompt_Lobby_Azar_Cafetero
sonar.organization=los-ingenieros-del-prompt
sonar.projectName=Azar Cafetero - Lobby Service
sonar.projectVersion=1.0

sonar.sources=src/main/java
sonar.tests=src/test/java

sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

sonar.sourceEncoding=UTF-8
sonar.java.source=21

# Cobertura JaCoCo
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Exclusiones de cobertura — deben coincidir exactamente con las de JaCoCo
sonar.coverage.exclusions=\
  **/LobbyApplication.java,\
  **/domain/model/**,\
  **/infrastructure/persistence/entity/**,\
  **/infrastructure/persistence/repository/**,\
  **/infrastructure/config/**,\
  **/infrastructure/web/GameTransactionRequest.java

# Exclusiones del análisis (ruido del build)
sonar.exclusions=\
  **/target/**
