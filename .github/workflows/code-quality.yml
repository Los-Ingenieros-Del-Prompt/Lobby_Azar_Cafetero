name: Code Quality Analysis (Reusable)

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '21'
      sonar-project-key:
        description: 'SonarCloud project key'
        required: true
        type: string
      sonar-organization:
        description: 'SonarCloud organization'
        required: true
        type: string
      coverage-threshold:
        description: 'Minimum coverage percentage (0-100)'
        required: false
        type: number
        default: 80
    secrets:
      SONAR_TOKEN:
        description: 'SonarCloud authentication token'
        required: true

jobs:
  quality-gate:
    name: Static Analysis & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (full history for Sonar blame)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Run tests with JaCoCo coverage
        run: mvn -B clean verify

      - name: Verify coverage threshold (${{ inputs.coverage-threshold }}%)
        run: |
          echo "Checking JaCoCo report..."
          REPORT=target/site/jacoco/jacoco.xml
          if [ ! -f "$REPORT" ]; then
            echo "::error::JaCoCo report not found at $REPORT"
            exit 1
          fi

          MISSED=$(grep -oP 'type="LINE" missed="\K\d+' $REPORT | tail -1)
          TOTAL_COVERED=$(grep -oP 'type="LINE"[^/]*covered="\K\d+' $REPORT | tail -1)
          TOTAL=$((MISSED + TOTAL_COVERED))

          if [ "$TOTAL" -eq 0 ]; then
            echo "::error::No coverage data found"
            exit 1
          fi

          PERCENT=$((TOTAL_COVERED * 100 / TOTAL))
          echo "Line coverage: $PERCENT% ($TOTAL_COVERED/$TOTAL)"

          if [ "$PERCENT" -lt "${{ inputs.coverage-threshold }}" ]; then
            echo "::error::Coverage $PERCENT% is below threshold ${{ inputs.coverage-threshold }}%"
            exit 1
          fi
          echo "::notice::Coverage gate passed: $PERCENT%"

      - name: SonarCloud Scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn -B sonar:sonar \
            -Dsonar.projectKey=${{ inputs.sonar-project-key }} \
            -Dsonar.organization=${{ inputs.sonar-organization }} \
            -Dsonar.host.url=https://sonarcloud.io

      - name: SonarCloud Quality Gate check
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          scanMetadataReportFile: target/sonar/report-task.txt

      - name: Upload JaCoCo report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco/
          retention-days: 7
